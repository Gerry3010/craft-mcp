name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: PHP lint (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Syntax check
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

  ecs:
    name: Code style (ECS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist
      - name: ECS
        run: vendor/bin/ecs check --no-progress-bar

  phpstan:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

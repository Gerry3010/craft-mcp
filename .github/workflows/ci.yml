name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: PHP lint (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Syntax check
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

  ecs:
    name: Code style (ECS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist
      - name: ECS
        run: vendor/bin/ecs check --no-progress-bar

  phpstan:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

  notify:
    name: Notify pipepush
    if: always()
    needs: [lint, ecs, phpstan]
    runs-on: ubuntu-latest
    steps:
      - name: Notify pipepush
        env:
          PIPEPUSH_TOKEN: ${{ secrets.PIPEPUSH_TOKEN }}
          PIPEPUSH_SERVER: ${{ vars.PIPEPUSH_SERVER }}
        run: |
          if [ -z "$PIPEPUSH_TOKEN" ]; then echo "PIPEPUSH_TOKEN not set — skipping."; exit 0; fi
          status=success
          if ${{ contains(needs.*.result, 'failure') }}; then status=failure; fi
          if ${{ contains(needs.*.result, 'cancelled') }}; then status=failure; fi
          curl -sf -X POST "$PIPEPUSH_SERVER/api/webhook" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$PIPEPUSH_TOKEN\",\"status\":\"$status\",\"pipeline\":\"${{ github.workflow }}\",\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\",\"runId\":\"${{ github.run_number }}\"}"
